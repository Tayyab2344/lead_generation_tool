<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" /> <!-- HSL primary-like purple -->
      <stop offset="50%" stop-color="#3B82F6" />  <!-- Royal blue middle transition -->
      <stop offset="100%" stop-color="#06B6D4" /> <!-- HSL accent-like cyan -->
    </linearGradient>
    
    <!-- Premium Drop Shadow for depth -->
    <filter id="logoShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.25" />
    </filter>
  </defs>
  
  <!-- Rounded Base Rect mimicking the custom uploaded asset -->
  <rect width="100" height="100" rx="28" fill="url(#bgGrad)" />
  
  <!-- Fancy Monogram Group -->
  <g filter="url(#logoShadow)">
    <!-- Stylized, custom intersecting 'L' -->
    <path d="M 28 32 L 28 64 C 28 68, 30 70, 34 70 L 50 70" 
          fill="none" 
          stroke="#FFFFFF" 
          stroke-width="9.5" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
          
    <!-- Stylized, custom intersecting 'P' -->
    <path d="M 48 30 L 62 30 C 71 30, 71 47, 62 47 L 48 47 L 48 70" 
          fill="none" 
          stroke="#FFFFFF" 
          stroke-width="9.5" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
  </g>
</svg>
